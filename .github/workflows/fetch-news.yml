name: Fetch Photonics News Daily

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 08:00
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch and update news
        run: python scripts/fetch_news.py
        continue-on-error: false

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/newsData.ts
          if ! git diff --staged --quiet; then
            git commit -m "feat: auto-update photonics news $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
