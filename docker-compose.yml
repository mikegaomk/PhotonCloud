version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AUTH_SECRET_KEY=photoncloud-production-secret
      - DATABASE_URL=postgresql+asyncpg://photoncloud:password@db:5432/photoncloud
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-4o-mini
      - RSS_FETCH_INTERVAL_HOURS=6
      - RSS_FETCH_TIMEOUT_SECONDS=30
      - NEWS_PAGE_SIZE_MAX=100
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: photoncloud
      POSTGRES_USER: photoncloud
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoncloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
